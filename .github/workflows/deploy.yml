name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run build

      - name: Deploy build output to dist branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: dist
          folder: dist/public
          clean: true
